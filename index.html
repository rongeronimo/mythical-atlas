<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Mythical Atlas</title>
        <link rel="icon" type="image/svg+xml" href="assets/img/web-icon.png">
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="titlestyle.css">
    </head>

    <body>
        <section class="spacing-section">
                <div class="hero-title">
                    <div class="title-rotator">
                        <span class="word english">Mythical Atlas</span>
                        <span class="word japanese">ミシカル・アトラス</span>
                        <span class="word malay">Atlas Mitos</span>
                        <span class="word spanish">Atlas Mítico</span>
                        <span class="word french">Atlas Mythique</span>
                        <span class="word german">Mythischer Atlas</span>
                        <span class="word norwegian">Mytisk Atlas</span>
                        <span class="word arabic">الأطلس الأسطوري</span>
                    </div>

                    <p class="description-rotator">
                        Explore legendary creatures, folklores, and urban legends from around the world.
                    </p>
                </div>
        </section>

        <main class="timeline" data-app="timeline">
            <ul class="panels" data-panels>
            </ul>
            
            <div class="country-layer" aria-hidden="true">
                <div class="country-wrapper" data-timeline="country-wrapper">
                </div>
            </div>
        </main>

        <section class="spacing-section">
            <h1>End.</h1>
        </section>

        <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

        <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

        <script src="https://unpkg.com/lenis@1.3.23/dist/lenis.min.js"></script> 

        <script src="script.js"></script>

        <script src="title.js"></script>
    </body>
</html>
